name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize ]

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not formatted (run 'gofmt -w .' to fix):"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Run go vet
        run: go vet -tags testing -unsafeptr=false ./...
      
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m

  build-run:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Unit Tests
        run: make test

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build toolchain image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: go-dav-os-toolchain:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ISO
        run: |
          docker run --rm --platform=linux/amd64 \
            -v "$PWD":/work -w /work \
            go-dav-os-toolchain:ci \
            make -j$(nproc)

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: dav-go-os-iso
          path: build/dav-go-os.iso

      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86

      - name: Run Integration Tests
        run: python3 scripts/test_boot.py
